<mat-card class="card-oas">

  <mat-card-title class="resoluciones-title">
    <h1>Gestión de resoluciones</h1>
  </mat-card-title>

  <mat-card-content>

    <div class="form-grid">

      <mat-form-field appearance="outline" *ngIf="mostrarFiltroDependencia">
        <mat-label>Dependencia</mat-label>

        <mat-select [(ngModel)]="dependenciaSeleccionada" name="dependencia">

          <mat-option [value]="null" *ngIf="dependencias.length > 1">
            Seleccione una dependencia
          </mat-option>

          <mat-option *ngFor="let item of dependencias" [value]="item.id_oikos">
            {{ item.nombre || ('Dependencia ' + item.codigo_dependencia) }}
          </mat-option>

        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Vigencia</mat-label>

        <mat-select [(ngModel)]="vigenciaSeleccionada" name="vigencia">
          <mat-option *ngFor="let year of vigencias" [value]="year">
            {{ year }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <div class="acciones-formulario">

        <button
          mat-raised-button
          color="primary"
          type="button"
          (click)="consultarResoluciones()">
          Consultar
        </button>

        <button
          mat-stroked-button
          type="button"
          (click)="limpiarConsulta()">
          Limpiar
        </button>

      </div>

    </div>

    <div class="tabla-container" *ngIf="mostrarTabla">
      <ng2-smart-table
        [settings]="resolucionesSettings"
        [source]="resolucionesData">
      </ng2-smart-table>
    </div>

  </mat-card-content>

  <button
    mat-button
    class="button button-submit"
    type="button"
    (click)="crearResolucion()">
    Crear Resolución de Vinculación Especial
  </button>

  <button
    mat-button
    class="button button-add"
    type="button"
    (click)="consultarDocente()">
    Consultar docente
  </button>

</mat-card>
